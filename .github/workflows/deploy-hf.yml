name: Deploy to HF Space + Blog

on:
  push:
    branches: [main]

jobs:
  deploy-space:
    name: Deploy code to HF Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install huggingface_hub -q

      - name: Upload code to HF Space (exclude assets/*.png)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "amaljoe88/vision-coder-openenv"

          # Patterns to ignore — binary PNGs rejected by HF Xet storage
          ignore_patterns = ["assets/*.png", "*.png", "__pycache__", "*.pyc",
                             ".git", "checkpoints", "*.log", "*.json.partial"]

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=ignore_patterns,
              commit_message=f"deploy: sync from GitHub Actions ({os.environ.get('GITHUB_SHA','')[:8]})",
          )
          print(f"Deployed to https://huggingface.co/spaces/{repo_id}")
          EOF

  deploy-blog:
    name: Publish blog.md to HF model card
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install huggingface_hub -q

      - name: Push blog.md + assets as model card
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'EOF'
          from huggingface_hub import HfApi
          from pathlib import Path
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "amaljoe88/vision-coder-openenv"

          try:
              api.create_repo(repo_id=repo_id, repo_type="model", exist_ok=True, private=False)
          except Exception as e:
              print(f"Repo create: {e}")

          # Upload blog.md as README.md
          api.upload_file(
              path_or_fileobj="blog.md",
              path_in_repo="README.md",
              repo_id=repo_id,
              repo_type="model",
              commit_message="Update blog from GitHub Actions",
          )

          # Upload all assets (PNGs, JSONs) — huggingface_hub handles binaries fine
          assets = list(Path("assets").glob("*")) if Path("assets").exists() else []
          if assets:
              api.upload_folder(
                  folder_path="assets",
                  path_in_repo="assets",
                  repo_id=repo_id,
                  repo_type="model",
                  commit_message="Update blog assets from GitHub Actions",
              )
              print(f"Uploaded {len(assets)} assets")

          print(f"Blog published at https://huggingface.co/{repo_id}")
          EOF
