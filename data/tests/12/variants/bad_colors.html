<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Analytics</title></head>
<body style="margin:0;font-family:sans-serif;background:#070503;color:#e1d6c4;">
  <nav style="background:#fff;border-bottom:1px solid #1d170f;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:24px;">
      <span style="font-weight:700;font-size:17px;color:#b0b91a;">Analytics</span>
      <div style="display:flex;gap:4px;background:#0e0a06;border-radius:6px;padding:3px;">
        <button style="padding:5px 14px;background:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.1);">7d</button>
        <button style="padding:5px 14px;background:transparent;border:none;font-size:13px;cursor:pointer;color:#9b8b74;">30d</button>
        <button style="padding:5px 14px;background:transparent;border:none;font-size:13px;cursor:pointer;color:#9b8b74;">90d</button>
      </div>
    </div>
    <button style="padding:8px 16px;background:#b0b91a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Export CSV</button>
  </nav>
  <div style="padding:28px;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:20px;"><p style="margin:0 0 6px;font-size:12px;font-weight:600;color:#9b8b74;text-transform:uppercase;">Total Revenue</p><p style="margin:0;font-size:26px;font-weight:700;">$84,231</p><p style="margin:6px 0 0;font-size:12px;color:#e95cb5;">↑ 18.2% vs last period</p></div>
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:20px;"><p style="margin:0 0 6px;font-size:12px;font-weight:600;color:#9b8b74;text-transform:uppercase;">Visitors</p><p style="margin:0;font-size:26px;font-weight:700;">24,891</p><p style="margin:6px 0 0;font-size:12px;color:#e95cb5;">↑ 7.4%</p></div>
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:20px;"><p style="margin:0 0 6px;font-size:12px;font-weight:600;color:#9b8b74;text-transform:uppercase;">Conversion</p><p style="margin:0;font-size:26px;font-weight:700;">3.6%</p><p style="margin:6px 0 0;font-size:12px;color:#10bbbb;">↓ 0.4%</p></div>
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:20px;"><p style="margin:0 0 6px;font-size:12px;font-weight:600;color:#9b8b74;text-transform:uppercase;">Avg Order</p><p style="margin:0;font-size:26px;font-weight:700;">$94.30</p><p style="margin:6px 0 0;font-size:12px;color:#e95cb5;">↑ 10.1%</p></div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:24px;">
        <h3 style="margin:0 0 20px;font-size:15px;">Revenue Over Time</h3>
        <div style="display:flex;align-items:flex-end;gap:8px;height:120px;">
          <div style="flex:1;background:#121601;border-radius:4px 4px 0 0;height:40%;"></div>
          <div style="flex:1;background:#121601;border-radius:4px 4px 0 0;height:55%;"></div>
          <div style="flex:1;background:#121601;border-radius:4px 4px 0 0;height:48%;"></div>
          <div style="flex:1;background:#121601;border-radius:4px 4px 0 0;height:72%;"></div>
          <div style="flex:1;background:#121601;border-radius:4px 4px 0 0;height:60%;"></div>
          <div style="flex:1;background:#b0b91a;border-radius:4px 4px 0 0;height:85%;"></div>
          <div style="flex:1;background:#b0b91a;border-radius:4px 4px 0 0;height:100%;"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;font-size:11px;color:#6b5c47;">
          <span style="flex:1;text-align:center;">Mon</span><span style="flex:1;text-align:center;">Tue</span><span style="flex:1;text-align:center;">Wed</span><span style="flex:1;text-align:center;">Thu</span><span style="flex:1;text-align:center;">Fri</span><span style="flex:1;text-align:center;">Sat</span><span style="flex:1;text-align:center;">Sun</span>
        </div>
      </div>
      <div style="background:#fff;border:1px solid #1d170f;border-radius:10px;padding:24px;">
        <h3 style="margin:0 0 16px;font-size:15px;">Top Sources</h3>
        <div style="font-size:13px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span>Google</span><div style="display:flex;align-items:center;gap:8px;"><div style="width:80px;height:6px;background:#1d170f;border-radius:3px;overflow:hidden;"><div style="width:62%;height:100%;background:#b0b91a;border-radius:3px;"></div></div><span style="color:#888;font-size:12px;">62%</span></div></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span>Direct</span><div style="display:flex;align-items:center;gap:8px;"><div style="width:80px;height:6px;background:#1d170f;border-radius:3px;overflow:hidden;"><div style="width:22%;height:100%;background:#7e7307;border-radius:3px;"></div></div><span style="color:#888;font-size:12px;">22%</span></div></div>
          <div style="display:flex;justify-content:space-between;align-items:center;"><span>Social</span><div style="display:flex;align-items:center;gap:8px;"><div style="width:80px;height:6px;background:#1d170f;border-radius:3px;overflow:hidden;"><div style="width:16%;height:100%;background:#3b4a02;border-radius:3px;"></div></div><span style="color:#888;font-size:12px;">16%</span></div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
